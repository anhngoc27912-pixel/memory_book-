<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunshine Memories for AN ☀️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="hero">

  <div class="hero-content">

    <h1>☀️ Dear AN</h1>

    <p class="subtitle">
      Leave a little piece of your heart for AN.
    </p>

    <button id="openLetter">
      💌 Write a Letter
    </button>

    <p class="quote">
      "If someday you miss me, you'll always find me here,
      where the sunshine keeps our memories warm."
    </p>

  </div>

</div>

<div id="letterForm" class="hidden">

<iframe
data-tally-src="https://tally.so/embed/RGa1Kp?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
loading="lazy"
width="100%"
height="380"
frameborder="0"
marginheight="0"
marginwidth="0"
title="Memory Book for AN"
style="border:none;border-radius:20px;">
</iframe>

</div>

<script src="script.js"></script>

<script>
var d=document,
w="https://tally.so/widgets/embed.js",
v=function(){
if(typeof Tally!=="undefined"){
Tally.loadEmbeds();
}else{
d.querySelectorAll("iframe[data-tally-src]:not([src])")
.forEach(function(e){
e.src=e.dataset.tallySrc;
});
}
};

if(typeof Tally!=="undefined"){
v();
}else if(d.querySelector('script[src="'+w+'"]')==null){
var s=d.createElement("script");
s.src=w;
s.onload=v;
s.onerror=v;
d.body.appendChild(s);
}
</script>

</body>
</html>
