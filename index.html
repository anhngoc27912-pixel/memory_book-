<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Book - AN</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

  <div class="hero-content">

    <h1>☀️ Dear AN</h1>

    <p class="subtitle">
      Leave a little piece of your heart for AN.
    </p>

    <button id="openLetter">
      💌 Write a Letter
    </button>

    <p class="quote">
      "If someday you miss me, you'll always find me here,
      where the sunshine keeps our memories warm."
    </p>

  </div>

</div>


<div id="letterForm" class="hidden">

  <h2>💌 Write something for AN</h2>

  <input
    type="text"
    placeholder="Your name (optional)"
  >

  <textarea
    placeholder="Write your memory here..."
  ></textarea>

  <button id="sendLetter">
    ☀️ Send to AN
  </button>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
