<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sunshine Memories for AN ☀️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Clouds -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <!-- Hero -->
    <section class="hero">

        <div class="hero-content">

            <h1>☀️ Dear AN</h1>

            <p class="subtitle">
                Leave a little piece of your heart for AN.
            </p>

            <button id="openLetter">
                💌 Write a Letter
            </button>

            <p class="quote">
                "If someday you miss me, you'll always find me here,
                where the sunshine keeps our memories warm."
            </p>

        </div>

    </section>

    <!-- Form -->
    <section id="letterForm" class="hidden">

        <iframe
            data-tally-src="https://tally.so/embed/RGa1Kp?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
            loading="lazy"
            width="100%"
            height="1600"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            title="Memory Book for AN"
            style="border:none;border-radius:25px;">
        </iframe>

    </section>

    <!-- Footer -->
    <footer class="footer">

        <p>☀️ Thank you for leaving a little sunshine here.</p>

        <p class="footer-small">
            Every memory is cherished by AN 💛
        </p>

    </footer>

    <!-- Script -->
    <script src="script.js"></script>

    <!-- Tally -->
    <script async src="https://tally.so/widgets/embed.js"></script>

</body>

</html>
